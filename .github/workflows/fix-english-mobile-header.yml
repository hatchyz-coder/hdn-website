name: Fix English mobile header

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-english-mobile-header.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore English mobile navigation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          files = [Path('en/index.html'), Path('en/self-pay.html'), Path('en/lhub.html')]
          old = '.nav a:not(.lang){display:none}'
          new = '''.header-inner{align-items:flex-start;flex-direction:column;padding:12px 0;gap:10px}.nav{display:grid;width:100%;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.nav a{display:grid!important;place-items:center;min-height:40px;padding:0 8px;border:1px solid var(--line);border-radius:7px;background:#fff;text-align:center}.nav a[href*="forms.gle"]{display:none!important}.nav .lang{display:none!important}'''

          for path in files:
              html = path.read_text(encoding='utf-8')
              if old in html:
                  html = html.replace(old, new, 1)
              path.write_text(html, encoding='utf-8')
          PY

      - name: Verify English navigation
        run: |
          for file in en/index.html en/self-pay.html en/lhub.html; do
            grep -q '>Home<' "$file"
            grep -q '>Private Care<' "$file"
            grep -q '>LHub<' "$file"
            grep -q 'grid-template-columns:repeat(3,minmax(0,1fr))' "$file"
            if grep -q '.nav a:not(.lang){display:none}' "$file"; then
              echo "Legacy mobile navigation rule remains in $file"
              exit 1
            fi
          done

      - name: Commit fixes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add en/index.html en/self-pay.html en/lhub.html
          git commit -m "Restore English mobile navigation [skip ci]"
          git push
