name: Apply HDN website refresh

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/apply-hdn-next.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch HTML and SVG assets
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          FORM = 'https://forms.gle/148jgfSnDgDZ2HsEA'
          root = Path('.')
          assets = root / 'assets'
          assets.mkdir(exist_ok=True)

          svg_patient = '''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
            <title id="title">医療機関と患者導線の整理</title><desc id="desc">医療機関の建物とミーティングを行うスタッフのイラスト</desc>
            <rect width="720" height="520" fill="#fff"/>
            <g transform="translate(382 38)">
              <path d="M64 0 250 106 250 354 64 462 -122 354 -122 106Z" fill="#eef3f5"/>
              <path d="M64 0 250 106 64 212 -122 106Z" fill="#dfe6ea"/>
              <path d="M64 212 250 106 250 354 64 462Z" fill="#ccd4d8"/>
              <path d="M64 212 -122 106 -122 354 64 462Z" fill="#f2f6f8"/>
              <rect x="-78" y="138" width="74" height="12" fill="#8dc5e8"/><rect x="28" y="198" width="74" height="12" fill="#8dc5e8"/><rect x="28" y="242" width="74" height="12" fill="#8dc5e8"/><rect x="28" y="286" width="74" height="12" fill="#8dc5e8"/>
              <path d="M-18 286h52v68h-52z" fill="#87939a"/><path d="M142 158h46v86h-46z" fill="#d9e1e5"/>
              <path d="M10 116h34v34h34v36H44v34H10v-34h-34v-36h34z" fill="#4fa7d8"/>
            </g>
            <g transform="translate(98 304)">
              <ellipse cx="190" cy="118" rx="192" ry="48" fill="#edf4f8"/>
              <path d="M56 50 198 0l152 52-150 58z" fill="#ffffff" stroke="#d7e4ea" stroke-width="2"/>
              <path d="M106 46l74-26 58 20-76 28z" fill="#e9f0f4"/><path d="M202 78l74-27 44 16-74 28z" fill="#e9f0f4"/>
              <g fill="#2e3e66"><path d="M52 102c-22 8-38 1-47-21 14-3 27-2 39 5l14-34c13 6 18 18 11 35z"/><path d="M339 94c-16 9-32 5-48-11 7-11 16-18 28-20l-5-34c14-2 25 6 29 24z"/></g>
              <g fill="#8fc7e8"><path d="M28 118h38v70H28z"/><path d="M308 110h42v78h-42z"/><path d="M144 92h48v86h-48z"/></g>
              <g fill="#f2b6c4"><circle cx="49" cy="50" r="16"/><circle cx="319" cy="33" r="15"/><circle cx="168" cy="47" r="16"/></g>
              <g fill="#30466f"><path d="M37 67c22 0 35 14 33 38l-3 36H23l-4-34c-3-24 3-38 18-40z"/><path d="M304 50c24 0 38 15 37 42l-2 32h-48l-4-32c-3-27 3-42 17-42z"/><path d="M154 65c24-3 40 10 43 36l4 34h-54l-8-32c-6-23-1-36 15-38z"/></g>
            </g>
          </svg>'''

          svg_consult = '''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
            <title id="title">無料相談と導線整理</title><desc id="desc">ホワイトボードを使って相談するイラスト</desc>
            <rect width="720" height="520" fill="#fff"/>
            <ellipse cx="368" cy="390" rx="250" ry="84" fill="#edf6f4"/>
            <g transform="translate(404 96)">
              <rect x="0" y="0" width="204" height="146" rx="4" fill="#ffffff" stroke="#b9d6d1" stroke-width="8"/>
              <path d="M32 178h142" stroke="#b9d6d1" stroke-width="8" stroke-linecap="round"/><path d="M28 146v48M178 146v48" stroke="#b9d6d1" stroke-width="8" stroke-linecap="round"/>
              <path d="M34 42h118M34 76h92M34 110h136" stroke="#dbecea" stroke-width="9" stroke-linecap="round"/>
            </g>
            <g transform="translate(294 190)"><rect x="0" y="74" width="88" height="106" rx="6" fill="#b9d2cf"/><path d="M18 0h116v76H18z" fill="#ffffff" stroke="#c7d9d7" stroke-width="4"/><path d="M36 24h62M36 44h78" stroke="#8fc7e8" stroke-width="7" stroke-linecap="round"/></g>
            <g transform="translate(178 112)"><circle cx="42" cy="36" r="22" fill="#e5a98e"/><path d="M18 64c28-14 58-11 72 8 10 14 13 64 5 148H18C8 132 9 80 18 64z" fill="#dce8e7"/><path d="M30 219h32l-8 120H27zM74 219h28l16 120H91z" fill="#263b51"/><path d="M25 91c18 27 42 43 75 48" stroke="#e59db3" stroke-width="10" stroke-linecap="round" fill="none"/><path d="M14 96c11 29 24 47 38 54" stroke="#e59db3" stroke-width="10" stroke-linecap="round" fill="none"/><path d="M24 18c20-26 61-12 60 19-20-4-37-5-52-1z" fill="#2e3e66"/></g>
            <g transform="translate(438 214)"><circle cx="42" cy="30" r="19" fill="#d78f73"/><path d="M22 56c31-13 61-4 72 24 10 26 3 86-5 142H19c-8-72-7-140 3-166z" fill="#9fcfbe"/><path d="M22 222h28l-9 100H17zM66 222h28l18 100H84z" fill="#e6efed"/><path d="M30 84c34 15 66 12 98-12" stroke="#d78f73" stroke-width="9" stroke-linecap="round" fill="none"/><path d="M28 15c17-19 48-10 53 13-14 2-28 0-41-5z" fill="#8c5a3d"/></g>
            <g transform="translate(132 250)"><path d="M44 0c34 4 58 30 52 65-26 0-50-10-72-30z" fill="#689b7c"/><path d="M54 50c-24-4-42-21-54-50 32 5 52 20 62 44z" fill="#7cb99b"/><path d="M52 50c16-22 37-35 64-39-9 28-26 45-52 51z" fill="#91c9af"/><rect x="42" y="78" width="50" height="58" rx="4" fill="#40515a"/></g>
          </svg>'''

          svg_lhub = '''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
            <title id="title">LHub運用基盤</title><desc id="desc">スマートフォンとCRM画面、患者導線がつながるイラスト</desc>
            <rect width="720" height="520" fill="#fff"/>
            <ellipse cx="362" cy="398" rx="270" ry="70" fill="#edf6f4"/>
            <g transform="translate(108 86)"><rect x="0" y="0" width="184" height="334" rx="32" fill="#20324b"/><rect x="18" y="32" width="148" height="254" rx="14" fill="#f8fbfc"/><circle cx="92" cy="308" r="12" fill="#51657c"/><path d="M44 76h96M44 112h74M44 148h102" stroke="#8fc7e8" stroke-width="12" stroke-linecap="round"/><rect x="38" y="190" width="108" height="44" rx="10" fill="#2fa16f"/><path d="M64 212h58" stroke="#fff" stroke-width="9" stroke-linecap="round"/></g>
            <g transform="translate(320 92)"><rect x="0" y="0" width="286" height="204" rx="18" fill="#ffffff" stroke="#d9e7e8" stroke-width="4"/><path d="M28 38h146M28 75h102M28 112h214M28 149h170" stroke="#c8e3f3" stroke-width="14" stroke-linecap="round"/><circle cx="238" cy="48" r="22" fill="#2fa16f"/><path d="M226 49l9 9 18-22" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
            <g transform="translate(330 330)"><rect x="0" y="0" width="270" height="64" rx="32" fill="#f3f8f7" stroke="#d5e8e2" stroke-width="4"/><circle cx="42" cy="32" r="18" fill="#2fa16f"/><path d="M82 24h142M82 42h94" stroke="#9fcfbe" stroke-width="10" stroke-linecap="round"/></g>
            <g transform="translate(474 194)"><circle cx="42" cy="28" r="18" fill="#e5a98e"/><path d="M20 52c28-14 61-8 76 20 7 13 8 52 3 96H19c-8-57-8-101 1-116z" fill="#31476f"/><path d="M25 84c-34 12-60 27-78 48" stroke="#e59db3" stroke-width="9" stroke-linecap="round" fill="none"/><path d="M72 82c26 2 52 10 76 25" stroke="#e59db3" stroke-width="9" stroke-linecap="round" fill="none"/></g>
          </svg>'''

          (assets / 'illustration-patient-assets.svg').write_text(svg_patient, encoding='utf-8')
          (assets / 'illustration-consultation.svg').write_text(svg_consult, encoding='utf-8')
          (assets / 'illustration-lhub-crm.svg').write_text(svg_lhub, encoding='utf-8')

          promise_css = '''
    .contact-wrap {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }
    .contact-wrap .contact-inner {
      width: 100%;
    }
    .contact-promise {
      background: #f7faf7;
      border: 1px solid #d7e7db;
      border-radius: 24px;
      padding: 24px 28px;
      color: var(--ink);
    }
    .contact-promise .promise-label {
      display: inline-block;
      background: #2fa16f;
      color: white;
      border-radius: 999px;
      padding: 8px 16px;
      font-weight: 900;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .contact-promise h3 {
      font-size: 28px;
      line-height: 1.4;
      margin: 0 0 10px;
      color: #123524;
    }
    .contact-promise .promise-intro {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }
    .promise-list {
      list-style: none;
      padding: 0;
      margin: 0 0 16px;
      display: grid;
      gap: 12px;
    }
    .promise-list li {
      position: relative;
      padding-left: 34px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.7;
      color: #202020;
    }
    .promise-list li::before {
      content: '○';
      position: absolute;
      left: 0;
      top: -1px;
      color: #2fa16f;
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }
    .promise-foot {
      margin: 0;
      color: #2fa16f;
      font-size: 17px;
      font-weight: 900;
      text-align: center;
    }
'''

          promise_html = f'''
    <div class="contact-promise">
      <span class="promise-label">HDNからのお約束</span>
      <h3>まずは15〜30分、今の体制で何ができるかを整理する時間です。</h3>
      <p class="promise-intro">お問い合わせの前に、次の3点をお約束します。</p>
      <ul class="promise-list">
        <li>高額なコンサルティング契約への誘導はいたしません。</li>
        <li>強引な営業電話や、しつこい追客はいたしません。</li>
        <li>現場のスタッフが疲弊するような、無理な提案はいたしません。</li>
      </ul>
      <p class="promise-foot">まずは現状を整理することを目的にした時間です。お気軽にご相談ください。</p>
    </div>
'''

          recommend_css = '''    .recommend {
      position: absolute;
      top: 14px;
      right: 18px;
      z-index: 2;
      padding: 6px 18px;
      border-radius: 999px;
      background: var(--white);
      color: var(--red-2);
      border: 2px solid rgba(255, 255, 255, 0.72);
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(84, 14, 10, 0.24);
    }
'''

          def add_form_targets(text: str) -> str:
              def repl(m):
                  tag = m.group(0)
                  if 'target=' not in tag:
                      tag = tag[:-1] + ' target="_blank" rel="noopener noreferrer">'
                  elif 'rel=' not in tag:
                      tag = tag[:-1] + ' rel="noopener noreferrer">'
                  return tag
              return re.sub(r'<a\b[^>]*href="' + re.escape(FORM) + r'"[^>]*>', repl, text)

          def add_common_css(text: str) -> str:
              if '.contact-promise' not in text:
                  text = text.replace('\n    .footer {', '\n' + promise_css + '\n    .footer {')
              if '.recommend {' in text:
                  text = re.sub(r'    \.recommend \{.*?\n    \}\n', recommend_css, text, count=1, flags=re.S)
              return text

          def remove_internal_ai_section(text: str) -> str:
              return re.sub(
                  r'\n\s*<section class="section">\s*\n\s*<div class="container">\s*\n\s*<div class="section-head">\s*\n\s*<div>\s*\n\s*<p class="eyebrow">AI Website Operation</p>.*?</section>\s*(?=\n\s*<section id="cases")',
                  '\n', text, flags=re.S
              )

          def replace_contact(text: str, headline: str, body: str, button: str) -> str:
              block = f'''<section id="contact" class="contact">
    <div class="contact-wrap">
      <div class="contact-inner">
        <div>
          <h2>{headline}</h2>
          <p>{body}</p>
        </div>
        <a class="button" href="{FORM}" target="_blank" rel="noopener noreferrer">{button}</a>
      </div>
{promise_html}
    </div>
  </section>'''
              return re.sub(r'<section id="contact" class="contact">.*?</section>', block, text, flags=re.S)

          for name in ['index.html', 'self-pay.html', 'consultation.html', 'lhub.html']:
              p = root / name
              if not p.exists():
                  continue
              text = p.read_text(encoding='utf-8')
              text = text.replace('assets/illustration-patient-assets.jpg', 'assets/illustration-patient-assets.svg')
              text = text.replace('assets/illustration-patient-assets.png', 'assets/illustration-patient-assets.svg')
              text = text.replace('assets/illustration-consultation.jpg', 'assets/illustration-consultation.svg')
              text = text.replace('assets/illustration-consultation.png', 'assets/illustration-consultation.svg')
              text = text.replace('assets/illustration-lhub-crm.jpg', 'assets/illustration-lhub-crm.svg')
              text = text.replace('assets/illustration-lhub-crm.png', 'assets/illustration-lhub-crm.svg')
              text = text.replace('href="consultation.html" class="button">無料相談</a>', f'href="{FORM}" class="button">無料相談</a>')
              text = text.replace('href="consultation.html">患者基盤の活用を相談する</a>', f'href="{FORM}">患者基盤の活用を相談する</a>')
              text = text.replace('href="consultation.html">自費診療導入を相談する</a>', f'href="{FORM}">自費診療導入を相談する</a>')
              text = text.replace('href="consultation.html">最初の導線を相談する</a>', f'href="{FORM}">最初の導線を相談する</a>')
              text = text.replace('href="consultation.html">LHub導入を相談する</a>', f'href="{FORM}">LHub導入を相談する</a>')
              text = text.replace('href="consultation.html" class="button">相談する</a>', f'href="{FORM}" class="button">相談する</a>')
              text = text.replace('href="#contact" class="button">無料相談</a>', f'href="{FORM}" class="button">無料相談</a>')
              text = add_common_css(text)
              text = add_form_targets(text)
              if name == 'index.html':
                  text = remove_internal_ai_section(text)
                  text = replace_contact(text, '患者導線を、まず一度見せてください。', '現状のHP・LINE・問診・予約・決済導線を確認し、最初に直すべき箇所を整理します。', '無料相談・導線診断を申し込む')
              elif name == 'self-pay.html':
                  text = replace_contact(text, '自費導入の進め方を、まず一緒に整理しましょう。', 'まずは現在のHP、LINE、予約、決済、患者フォローの流れを見ながら、最初に直すべき箇所を整理します。', '無料相談へ進む')
              elif name == 'consultation.html':
                  text = replace_contact(text, '患者導線を、まず一度見せてください。', '現状のHP・LINE・問診・予約・決済導線を確認し、最初に直すべき箇所を整理します。', '無料相談を申し込む')
              elif name == 'lhub.html':
                  text = replace_contact(text, 'LHub導入の前に、今の患者接点を整理しましょう。', 'LINE、予約、問診、決済、フォロー導線を確認し、LHubでつなぐべき範囲を整理します。', 'LHub導入を相談する')
              p.write_text(text, encoding='utf-8')

          PY

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html self-pay.html consultation.html lhub.html assets/illustration-patient-assets.svg assets/illustration-consultation.svg assets/illustration-lhub-crm.svg
          git commit -m "Refresh illustrations and CTA trust messaging"
          git push
