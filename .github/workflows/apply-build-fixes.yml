name: Apply generated site fixes

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/build-pages.sh
      - assets/site-shell.css
      - assets/site-shell.js
      - index.html
      - self-pay.html
      - lhub.html
      - consultation.html
      - en/**
      - .github/workflows/apply-build-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build generated site
        run: bash scripts/build-pages.sh

      - name: Write generated pages back to published branch root
        run: |
          cp _site/index.html index.html
          cp _site/self-pay.html self-pay.html
          cp _site/lhub.html lhub.html
          cp _site/consultation.html consultation.html
          mkdir -p en
          cp _site/en/index.html en/index.html
          cp _site/en/self-pay.html en/self-pay.html
          cp _site/en/lhub.html en/lhub.html

      - name: Verify shared shell and language links
        run: |
          for page in index.html self-pay.html lhub.html en/index.html en/self-pay.html en/lhub.html; do
            grep -q 'site-shell.css' "$page"
            grep -q 'site-shell.js' "$page"
            grep -q 'class="language-switch"' "$page"
          done
          grep -q 'href="/en/"' index.html
          grep -q 'href="/en/self-pay.html"' self-pay.html
          grep -q 'href="/en/lhub.html"' lhub.html
          grep -q 'href="/"' en/index.html
          grep -q 'href="/self-pay.html"' en/self-pay.html
          grep -q 'href="/lhub.html"' en/lhub.html
          grep -q 'background: #ffffff !important' lhub.html
          grep -q 'color: #075d42 !important' lhub.html

      - name: Commit generated pages
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html self-pay.html lhub.html consultation.html en/index.html en/self-pay.html en/lhub.html
          git commit -m "Apply shared header and CTA fixes [skip ci]"
          git push